name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: MyPy
        run: python -m mypy src/quanter_swarm

      - name: Pytest with coverage gate
        run: python -m pytest --cov=src/quanter_swarm --cov-report=term-missing --cov-fail-under=80
